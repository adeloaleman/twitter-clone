server {
   listen 443 ssl;
   server_name twitter-clone.sinfrontera.net;

   ssl_certificate /etc/letsencrypt/live/twitter-clone.sinfrontera.net/fullchain.pem;
   ssl_certificate_key /etc/letsencrypt/live/twitter-clone.sinfrontera.net/privkey.pem;

   root /var/www/sinfronteras/twitter-clone/frontend/build;
   index index.html;

   # Static assets (must exist; avoid serving index.html for missing .js/.css)
   location /static/ {
       try_files $uri =404;
   }

   # SPA: serve index.html only for non-file routes
   location / {
       try_files $uri $uri/ /index.html;
   }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
   listen 80;
   server_name twitter-clone.sinfrontera.net;
   return 301 https://$host$request_uri;
}